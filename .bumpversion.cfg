[bumpversion]
current_version = 2.0.1
commit = True
tag = True

[bumpversion:file:pyproject.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:README.md]
search = Version: {current_version}
replace = Version: {new_version}

[bumpversion:file(mcp-img):docker/Dockerfile]
search = clarity-api[mcp]>={current_version}
replace = clarity-api[mcp]>={new_version}

[bumpversion:file(agent-img):docker/Dockerfile]
search = clarity-api[agent]>={current_version}
replace = clarity-api[agent]>={new_version}

[bumpversion:file:clarity_api/version.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:clarity_api/agent_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:clarity_api/mcp_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"
